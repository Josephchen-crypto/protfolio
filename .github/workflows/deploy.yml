name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build with OpenNext
        run: npm run cf:build

      - name: Ensure R2 cache bucket exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: b84bc70b8e19f158966cfa2f6859be5f
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "❌ CLOUDFLARE_API_TOKEN secret is not set."
            exit 1
          fi
          npx wrangler r2 bucket create protfolio-opennext-cache 2>/dev/null && echo "R2 bucket created" || echo "R2 bucket already exists, continuing..."

      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: b84bc70b8e19f158966cfa2f6859be5f
        run: npx wrangler pages project create protfolio --production-branch main && echo "Project ready" || echo "Project already exists, continuing..."

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: b84bc70b8e19f158966cfa2f6859be5f
        run: npx opennextjs-cloudflare deploy
